name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.lock

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip check

      - name: Dependency Vulnerability Audit
        run: pip-audit -r requirements.lock --progress-spinner off

      - name: Lint (ruff)
        run: ruff check src scripts tests

      - name: Format Check (ruff)
        run: ruff format --check src scripts tests

      - name: Type Check (mypy)
        run: mypy

      - name: Compile Check
        run: python -m compileall -q src scripts tests

      - name: Package Build Check
        run: python -m pip wheel --no-deps --wheel-dir /tmp/wheelhouse .

      - name: Repository Preflight
        run: python scripts/preflight_check.py

      - name: Run Unit Tests
        run: pytest -q --cov=src --cov-fail-under=90

      - name: Pipeline Smoke Run
        env:
          MPLCONFIGDIR: /tmp/mplconfig
        run: |
          python scripts/run_pipeline.py \
            --seed 11 \
            --customers 220 \
            --products 28 \
            --sales-reps 14 \
            --orders 2400 \
            --start-date 2024-01-01 \
            --end-date 2024-12-31

      - name: Release Gate
        run: python scripts/release_gate.py

      - name: Post-pipeline Preflight
        run: python scripts/preflight_check.py

      - name: Upload Release Reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-reports
          path: |
            outputs/release/
            outputs/final_validation_*.*
