name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.lock

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip check

      - name: Compile Check
        run: python -m compileall -q src scripts tests

      - name: Repository Preflight
        run: python scripts/preflight_check.py

      - name: Run Unit Tests
        run: pytest -q --cov=src --cov-fail-under=40

      - name: Pipeline Smoke Run
        env:
          MPLCONFIGDIR: /tmp/mplconfig
        run: |
          python scripts/run_pipeline.py \
            --seed 11 \
            --customers 220 \
            --products 28 \
            --sales-reps 14 \
            --orders 2400 \
            --start-date 2024-01-01 \
            --end-date 2024-12-31

      - name: Release Gate
        run: python scripts/release_gate.py

      - name: Upload Release Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-reports
          path: |
            outputs/release/
            outputs/final_validation_*.*
